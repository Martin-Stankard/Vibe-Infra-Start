
services:
    mongo:
        image: mongo:6
        environment:
          ALLOW_EMPTY_PASSWORD  : "yes"
          MONGODB_INITDB_DATABASE: admin
          
        ports:
          - "27017:27017"

        volumes:
          - ../test-zero:/data/db

    mongo-express:
        image: mongo-express
        environment:
            ME_CONFIG_MONGODB_SERVER: mongo
            ME_CONFIG_MONGODB_PORT: 27017
            ME_CONFIG_MONGODB_ENABLE_ADMIN: true
            


        depends_on:
            - mongo
        ports:
          - "8081:8081"


